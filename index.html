<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATURE_LOVERBNL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; }
        .gallery { column-count: 2; column-gap: 10px; padding: 10px; }
        @media (max-width: 600px) { .gallery { column-count: 1; } }
        img { width: 100%; border-radius: 4px; margin-bottom: 10px; opacity: 0.8; transition: 0.3s; }
        img:hover { opacity: 1; transform: scale(1.02); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { motion } = FramerMotion;
        const App = () => {
            // This looks for 1.jpg, 2.jpg, 3.jpg, etc.
            const photoNumbers = [1, 2, 3, 4, 5, 6]; 
            
            return (
                <div className="min-h-screen">
                    <nav className="p-8 border-b border-white/10 flex justify-between">
                        <h1 className="font-bold tracking-widest text-sm uppercase">Nature_LoverBNL</h1>
                        <a href="https://youtube.com/@nature_loverbnl" className="opacity-50 text-xs">YOUTUBE</a>
                    </nav>
                    
                    <header className="py-20 text-center">
                        <motion.h2 
                            initial={{ opacity: 0 }} animate={{ opacity: 1 }}
                            className="text-4xl italic font-serif"
                        >
                            Visual Archive
                        </motion.h2>
                    </header>

                    <main className="gallery">
                        {photoNumbers.map((num) => (
                            <motion.div key={num} initial={{ opacity: 0, y: 20 }} whileInView={{ opacity: 1, y: 0 }}>
                                <img 
                                    src={`images/${num}.jpg`} 
                                    alt="Portfolio Work"
                                    onError={(e) => { e.target.src = `images/${num}.JPG` }} 
                                />
                            </motion.div>
                        ))}
                    </main>
                    
                    <footer className="p-20 text-center opacity-20 text-[10px]">
                        © 2026 BALIMAN TAMANG
                    </footer>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
