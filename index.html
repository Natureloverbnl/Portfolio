<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Baliman Tamang | Visual Archive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

  <style>
    body { background-color: #030303; color: #fafafa; font-family: 'Inter', sans-serif; overflow-x: hidden; }
    h1, h2, h3 { font-family: 'Playfair Display', serif; }
    .gallery { column-count: 1; column-gap: 1.5rem; }
    @media (min-width: 768px) { .gallery { column-count: 2; } }
    @media (min-width: 1024px) { .gallery { column-count: 3; } }
    .img-wrap { overflow: hidden; background: #111; border-radius: 2px; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #333; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;
    const { motion, AnimatePresence, useScroll, useSpring } = FramerMotion;

    const photos = [
      { id: 1, src: "images/hero.jpg", title: "Himalayan Silence", cat: "Landscape" },
      { id: 2, src: "images/culture.jpg", title: "Indigenous Heritage", cat: "Ethnography" },
      { id: 3, src: "images/ilam.jpg", title: "Tea Field Research", cat: "Socio-Economic" },
      { id: 4, src: "images/lamjung.jpg", title: "Mountain Resilience", cat: "Highlands" },
      { id: 5, src: "images/research.jpg", title: "The Social Lens", cat: "Documentation" },
      { id: 6, src: "images/sauraha.jpg", title: "Community Borders", cat: "Social Work" }
    ];

    function Portfolio() {
      const [selected, setSelected] = useState(null);
      const { scrollYProgress } = useScroll();
      const scaleX = useSpring(scrollYProgress, { stiffness: 100, damping: 30 });

      return (
        <div className="min-h-screen">
          <motion.div className="fixed top-0 left-0 right-0 h-[2px] bg-white z-[100] origin-left" style={{ scaleX }} />

          <nav className="fixed top-0 w-full flex justify-between items-center px-10 py-6 z-50 mix-blend-difference">
            <h1 className="text-xs font-bold tracking-[0.4em] uppercase">Baliman Tamang</h1>
            <div className="flex gap-8 text-[10px] uppercase tracking-widest opacity-60">
              <a href="https://youtube.com/@nature_loverbnl" target="_blank" className="hover:opacity-100 transition">YouTube</a>
            </div>
          </nav>

          <header className="h-[70vh] flex flex-col items-center justify-center text-center px-6">
            <motion.p initial={{ opacity: 0 }} animate={{ opacity: 0.4 }} className="text-[10px] uppercase tracking-[0.8em] mb-4">Photographer & Social Researcher</motion.p>
            <motion.h1 initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 1 }} className="text-6xl md:text-9xl font-serif italic">
              Archive
            </motion.h1>
          </header>

          <main className="max-w-[1400px] mx-auto px-6 pb-40">
            <div className="gallery">
              {photos.map((photo, i) => (
                <motion.div
                  key={photo.id}
                  initial={{ opacity: 0, y: 40 }}
                  whileInView={{ opacity: 1, y: 0 }}
                  viewport={{ once: true }}
                  transition={{ delay: i * 0.1 }}
                  onClick={() => setSelected(photo)}
                  className="mb-8 cursor-zoom-in group"
                >
                  <div className="img-wrap">
                    <motion.img 
                      whileHover={{ scale: 1.05 }}
                      transition={{ duration: 0.8 }}
                      src={photo.src} 
                      className="w-full h-auto opacity-70 group-hover:opacity-100 transition-all duration-700 grayscale hover:grayscale-0"
                      onError={(e) => { e.target.style.display = 'none'; }}
                    />
                  </div>
                  <div className="mt-4 px-1">
                    <h3 className="text-lg font-serif italic text-gray-400 group-hover:text-white transition-colors">{photo.title}</h3>
                    <p className="text-[9px] uppercase tracking-widest opacity-30 mt-1">{photo.cat}</p>
                  </div>
                </motion.div>
              ))}
            </div>
          </main>

          <AnimatePresence>
            {selected && (
              <motion.div 
                initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} 
                onClick={() => setSelected(null)}
                className="fixed inset-0 z-[100] bg-black/95 backdrop-blur-md flex items-center justify-center p-6 cursor-zoom-out"
              >
                <motion.img 
                  initial={{ scale: 0.9 }} animate={{ scale: 1 }}
                  src={selected.src} 
                  className="max-w-full max-h-[85vh] object-contain" 
                />
                <div className="absolute bottom-10 text-center">
                  <p className="font-serif italic text-2xl">{selected.title}</p>
                  <p className="text-[10px] uppercase tracking-widest opacity-40 mt-2">Close</p>
                </div>
              </motion.div>
            )}
          </AnimatePresence>

          <footer className="py-20 text-center border-t border-white/5 opacity-20 text-[8px] uppercase tracking-[0.5em]">
            © 2026 Baliman Tamang | Visual Research
          </footer>
        </div>
      )
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Portfolio />);
  </script>
</body>
</html>
