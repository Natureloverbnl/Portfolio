<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nature_loverbnl | Visual Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Inter:wght@200;400;600&display=swap" rel="stylesheet" />
    <style>
        :root { --bg: #080808; --fg: #ffffff; --accent: #444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--fg); font-family: 'Inter', sans-serif; overflow-x: hidden; -webkit-font-smoothing: antialiased; }

        /* --- Global Navigation & Menu --- */
        nav {
            position: fixed;
            top: 0; left: 0; width: 100%;
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }
        .logo { font-family: 'Playfair Display'; font-weight: 900; font-size: 22px; text-decoration: none; color: #fff; letter-spacing: -1px; }

        .menu-trigger {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: none;
            border: none;
            color: white;
            z-index: 1100;
        }
        .hamburger { width: 20px; height: 1px; background: white; position: relative; transition: 0.3s; }
        .hamburger::before, .hamburger::after { content: ''; position: absolute; width: 100%; height: 1px; background: white; transition: 0.3s; }
        .hamburger::before { top: -6px; } .hamburger::after { top: 6px; }
        
        /* Active Menu State */
        .menu-active .hamburger { background: transparent; }
        .menu-active .hamburger::before { transform: rotate(45deg); top: 0; }
        .menu-active .hamburger::after { transform: rotate(-45deg); top: 0; }

        /* Full Screen Dropdown Overlay */
        .menu-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(8, 8, 8, 0.98);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1050;
            opacity: 0;
            visibility: hidden;
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .menu-overlay.active { opacity: 1; visibility: visible; }
        .menu-links { list-style: none; text-align: center; }
        .menu-links a {
            font-family: 'Playfair Display';
            font-size: 8vw;
            font-style: italic;
            text-decoration: none;
            color: white;
            display: block;
            line-height: 1.2;
            transition: 0.4s;
        }
        .menu-links a:hover { opacity: 0.4; padding-left: 20px; }

        /* --- Split Layout Structure --- */
        .container { display: flex; }
        
        .sidebar {
            position: fixed;
            top: 0; left: 0; width: 40%; height: 100vh;
            padding: 120px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 10;
        }
        .hero-text p.label { text-transform: uppercase; letter-spacing: 5px; font-size: 9px; margin-bottom: 20px; opacity: 0.4; }
        .hero-text h1 {
            font-family: 'Playfair Display';
            font-size: clamp(40px, 7vw, 110px);
            line-height: 0.85;
            font-style: italic;
            margin-bottom: 30px;
            text-transform: lowercase;
        }
        .hero-text p.desc { font-size: 14px; max-width: 320px; opacity: 0.5; line-height: 1.8; font-weight: 200; }

        /* Scrolling Content */
        .content { margin-left: 40%; width: 60%; padding: 120px 60px; }
        .gallery-item { margin-bottom: 180px; }
        .img-wrap { width: 100%; overflow: hidden; background: #111; border-radius: 2px; cursor: crosshair; }
        .img-wrap img {
            width: 100%; height: auto; display: block;
            filter: grayscale(1) brightness(0.7);
            transition: 1.8s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .gallery-item:hover img { filter: grayscale(0) brightness(1); transform: scale(1.05); }

        .item-info {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 15px;
        }
        .item-title { font-family: 'Playfair Display'; font-size: 32px; font-style: italic; font-weight: 400; }
        .item-meta { font-size: 9px; text-transform: uppercase; letter-spacing: 3px; opacity: 0.3; }

        /* Mobile Responsiveness */
        @media (max-width: 1024px) {
            .sidebar { position: relative; width: 100%; height: auto; padding: 100px 30px 40px; }
            .content { margin-left: 0; width: 100%; padding: 30px; }
            .hero-text h1 { font-size: 80px; }
            .menu-links a { font-size: 50px; }
        }
    </style>
</head>
<body id="bodyTag">

    <nav>
        <a href="#" class="logo">baliman.</a>
        <button class="menu-trigger" onclick="toggleMenu()">
            <span id="menuText">Menu</span>
            <div class="hamburger"></div>
        </button>
    </nav>

    <div class="menu-overlay" id="menuOverlay">
        <ul class="menu-links">
            <li><a href="index.html">Archive</a></li>
            <li><a href="https://youtube.com/@nature_loverbnl" target="_blank">Films</a></li>
            <li><a href="#">Social Work</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </div>

    <div class="container">
        <aside class="sidebar">
            <div class="hero-text">
                <p class="label">Nepal / Visual Archive</p>
                <h1>nature_<br>loverbnl</h1>
                <p class="desc">A professional collection of visual research exploring the quiet intersection of Himalayan heritage and modern documentation.</p>
            </div>
        </aside>

        <main class="content">
            <div id="gallery"></div>
        </main>
    </div>

    <script>
        // Toggle Dropdown Logic
        function toggleMenu() {
            const overlay = document.getElementById('menuOverlay');
            const body = document.getElementById('bodyTag');
            const menuText = document.getElementById('menuText');
            
            overlay.classList.toggle('active');
            body.classList.toggle('menu-active');
            
            if (overlay.classList.contains('active')) {
                menuText.innerText = "Close";
            } else {
                menuText.innerText = "Menu";
            }
        }

        // Gallery Data
        const photos = [
            { src: 'assets/images/hero.jpg', title: 'Himalayan Silence', loc: '01 / Highlands' },
            { src: 'assets/images/culture.jpg', title: 'Indigenous Heritage', loc: '02 / Sauraha' },
            { src: 'assets/images/ilam.jpg', title: 'Morning Mist', loc: '03 / Ilam' },
            { src: 'assets/images/lamjung.jpg', title: 'Highland Resilience', loc: '04 / Lamjung' },
            { src: 'assets/images/research.jpg', title: 'Field Discovery', loc: '05 / Documentation' }
        ];

        const container = document.getElementById('gallery');
        photos.forEach(p => {
            const div = document.createElement('div');
            div.className = 'gallery-item';
            div.innerHTML = `
                <div class="img-wrap"><img src="${p.src}" alt="${p.title}" loading="lazy"></div>
                <div class="item-info">
                    <span class="item-title">${p.title}</span>
                    <span class="item-meta">${p.loc}</span>
                </div>
            `;
            container.appendChild(div);
        });
    </script>
</body>
</html>
