<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Baliman Tamang | Visual Archive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,700&family=Inter:wght@200;400;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

  <style>
    body { background-color: #030303; color: #fafafa; font-family: 'Inter', sans-serif; overflow-x: hidden; }
    h1, h2, h3 { font-family: 'Playfair Display', serif; }
    .gallery { column-count: 1; column-gap: 2rem; }
    @media (min-width: 768px) { .gallery { column-count: 2; } }
    @media (min-width: 1024px) { .gallery { column-count: 3; } }
    .img-wrap { overflow: hidden; background: #111; border-radius: 2px; position: relative; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #333; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const { motion, AnimatePresence, useScroll, useSpring } = FramerMotion;

    const photos = [
      { id: 1, src: "images/hero.jpg", title: "Misty Himalayan Sunrise", location: "Himalayas" },
      { id: 2, src: "images/ilam.jpg", title: "Tea Fields of Ilam", location: "Eastern Nepal" },
      { id: 3, src: "images/Culture.jpg", title: "Indigenous Heritage", location: "Sauraha" },
      { id: 4, src: "images/lamjung.jpg", title: "Highland Resilience", location: "Lamjung" },
      { id: 5, src: "images/research.jpg", title: "The Social Lens", location: "Documentation" },
      { id: 6, src: "images/sauraha.jpg", title: "Wildlife Borders", location: "Chitwan" }
    ];

    function Portfolio() {
      const [selected, setSelected] = useState(null);
      const { scrollYProgress } = useScroll();
      const scaleX = useSpring(scrollYProgress, { stiffness: 100, damping: 30, restDelta: 0.001 });

      return (
        <div className="min-h-screen flex flex-col">
          {/* Progress Bar */}
          <motion.div className="fixed top-0 left-0 right-0 h-[2px] bg-white z-[100] origin-left" style={{ scaleX }} />

          {/* Nav */}
          <nav className="fixed top-0 w-full flex justify-between items-center px-10 py-6 z-50 mix-blend-difference">
            <motion.h1 initial={{opacity:0}} animate={{opacity:1}} className="text-sm font-bold tracking-[0.4em] uppercase">Baliman Tamang</motion.h1>
            <div className="flex gap-8 text-[10px] uppercase tracking-widest opacity-60">
              <a href="https://youtube.com/@nature_loverbnl" target="_blank" className="hover:opacity-100 transition">YouTube</a>
              <a href="https://behance.net/balimantamang" target="_blank" className="hover:opacity-100 transition">Behance</a>
            </div>
          </nav>

          {/* Hero Section */}
          <header className="h-screen flex flex-col items-center justify-center text-center px-6 relative">
            <motion.div 
              initial={{ opacity: 0, scale: 1.1 }} 
              animate={{ opacity: 0.15, scale: 1 }} 
              transition={{ duration: 2 }}
              className="absolute inset-0 z-0 overflow-hidden"
            >
              <img src="images/hero.jpg" className="w-full h-full object-cover" />
            </motion.div>

            <div className="relative z-10">
              <motion.p initial={{ opacity: 0, y: 20 }} animate={{ opacity: 0.4, y: 0 }} className="text-[10px] uppercase tracking-[0.8em] mb-4">Photographer & Researcher</motion.p>
              <motion.h1 
                initial={{ opacity: 0, y: 30 }} 
                animate={{ opacity: 1, y: 0 }} 
                transition={{ delay: 0.3, duration: 1 }}
                className="text-6xl md:text-9xl font-serif italic leading-none"
              >
                The Archive
              </motion.h1>
            </div>
          </header>

          {/* Gallery */}
          <main className="max-w-[1600px] mx-auto px-6 pb-40">
            <div className="gallery">
              {photos.map((photo, i) => (
                <motion.div
                  key={photo.id}
                  initial={{ opacity: 0, y: 50 }}
                  whileInView={{ opacity: 1, y: 0 }}
                  viewport={{ once: true, margin: "-100px" }}
                  transition={{ duration: 0.8, delay: i * 0.1 }}
                  onClick={() => setSelected(photo)}
                  className="mb-8 cursor-zoom-in group"
                >
                  <div className="img-wrap">
                    <motion.img 
                      whileHover={{ scale: 1.08 }}
                      transition={{ duration: 0.7 }}
                      src={photo.src} 
                      alt={photo.title}
                      className="w-full h-auto opacity-70 group-hover:opacity-100 transition-opacity grayscale hover:grayscale-0 duration-700"
                      onError={(e) => { e.target.src = e.target.src.includes('.jpg') ? e.target.src.replace('.jpg', '.JPG') : e.target.src; }}
                    />
                  </div>
                  <div className="mt-4 px-2 overflow-hidden">
                    <h3 className="text-xl font-serif italic mb-1 transition-colors group-hover:text-white text-gray-400">{photo.title}</h3>
                    <p className="text-[9px] uppercase tracking-widest opacity-30">{photo.location}</p>
                  </div>
                </motion.div>
              ))}
            </div>
          </main>

          {/* Lightbox */}
          <AnimatePresence>
            {selected && (
              <motion.div 
                initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} 
                onClick={() => setSelected(null)}
                className="fixed inset-0 z-[100] bg-black/98 backdrop-blur-xl flex items-center justify-center p-6 cursor-zoom-out"
              >
                <motion.img 
                  initial={{ scale: 0.9, opacity: 0 }}
                  animate={{ scale: 1, opacity: 1 }}
                  exit={{ scale: 0.9, opacity: 0 }}
                  src={selected.src} 
                  className="max-w-full max-h-[85vh] object-contain shadow-2xl" 
                />
                <div className="absolute bottom-10 text-center">
                  <p className="font-serif italic text-2xl mb-1">{selected.title}</p>
                  <p className="text-[10px] uppercase tracking-widest opacity-40">Click anywhere to close</p>
                </div>
              </motion.div>
            )}
          </AnimatePresence>

          <footer className="py-20 text-center border-t border-white/5 opacity-20 text-[9px] uppercase tracking-[0.5em]">
            © 2026 Baliman Tamang — All Rights Reserved
          </footer>
        </div>
      )
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Portfolio />);
  </script>
</body>
</html>
