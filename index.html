<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Baliman Tamang | Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

  <style>
    body { background-color: #030303; color: #fafafa; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
    h1, h2 { font-family: 'Playfair Display', serif; }
    .gallery { column-count: 1; column-gap: 1.5rem; }
    @media (min-width: 768px) { .gallery { column-count: 2; } }
    @media (min-width: 1024px) { .gallery { column-count: 3; } }
    .img-wrap { overflow: hidden; background: #111; border-radius: 2px; transition: transform 0.3s ease; }
    .img-wrap:hover { transform: translateY(-5px); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;
    const { motion, AnimatePresence } = FramerMotion;

    function App() {
      const [selected, setSelected] = useState(null);

      // EXACT PATHS based on your GitHub structure: assets/images/
      const photos = [
        { id: 1, src: "assets/images/hero.jpg", title: "Himalayan Silence", cat: "Landscape" },
        { id: 2, src: "assets/images/culture.jpg", title: "Indigenous Heritage", cat: "Ethnography" },
        { id: 3, src: "assets/images/ilam.jpg", title: "Tea Field Research", cat: "Socio-Economic" },
        { id: 4, src: "assets/images/lamjung.jpg", title: "Mountain Resilience", cat: "Highlands" },
        { id: 5, src: "assets/images/research.jpg", title: "The Social Lens", cat: "Documentation" },
        { id: 6, src: "assets/images/sauraha.jpg", title: "Community Borders", cat: "Social Work" }
      ];

      return (
        <div className="min-h-screen">
          <nav className="fixed top-0 w-full flex justify-between items-center px-8 py-6 z-50 mix-blend-difference">
            <h1 className="text-[10px] font-bold tracking-[0.4em] uppercase">Baliman Tamang</h1>
            <a href="https://youtube.com/@nature_loverbnl" target="_blank" className="text-[9px] uppercase tracking-widest opacity-60 hover:opacity-100 transition">YouTube</a>
          </nav>

          <header className="h-[60vh] flex flex-col items-center justify-center text-center px-6">
            <motion.h1 
              initial={{ opacity: 0, y: 15 }} 
              animate={{ opacity: 1, y: 0 }} 
              transition={{ duration: 1.2 }}
              className="text-7xl md:text-9xl font-serif italic"
            >
              Archive
            </motion.h1>
            <motion.p 
              initial={{ opacity: 0 }} 
              animate={{ opacity: 0.3 }} 
              className="text-[9px] uppercase tracking-[0.6em] mt-6"
            >
              Visual Research & Photography
            </motion.p>
          </header>

          <main className="max-w-[1400px] mx-auto px-6 pb-40">
            <div className="gallery">
              {photos.map((photo, i) => (
                <motion.div
                  key={photo.id}
                  initial={{ opacity: 0, scale: 0.95 }}
                  whileInView={{ opacity: 1, scale: 1 }}
                  viewport={{ once: true }}
                  transition={{ delay: i * 0.1 }}
                  onClick={() => setSelected(photo)}
                  className="mb-10 cursor-pointer group"
                >
                  <div className="img-wrap">
                    <img 
                      src={photo.src} 
                      className="w-full h-auto opacity-80 group-hover:opacity-100 transition-all duration-700 grayscale group-hover:grayscale-0"
                      alt={photo.title}
                    />
                  </div>
                  <div className="mt-4 px-1">
                    <h3 className="text-lg font-serif italic text-gray-500 group-hover:text-white transition-colors">{photo.title}</h3>
                    <p className="text-[8px] uppercase tracking-widest opacity-30 mt-1">{photo.cat}</p>
                  </div>
                </motion.div>
              ))}
            </div>
          </main>

          <AnimatePresence>
            {selected && (
              <motion.div 
                initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} 
                onClick={() => setSelected(null)}
                className="fixed inset-0 z-[100] bg-black/98 backdrop-blur-2xl flex flex-col items-center justify-center p-4 cursor-zoom-out"
              >
                <motion.img 
                  initial={{ scale: 0.9, opacity: 0 }} 
                  animate={{ scale: 1, opacity: 1 }}
                  src={selected.src} 
                  className="max-w-full max-h-[80vh] object-contain shadow-2xl" 
                />
                <div className="mt-8 text-center">
                  <p className="font-serif italic text-2xl">{selected.title}</p>
                  <p className="text-[10px] uppercase tracking-[0.4em] opacity-40 mt-2">Close</p>
                </div>
              </motion.div>
            )}
          </AnimatePresence>

          <footer className="py-20 text-center border-t border-white/5 opacity-10 text-[8px] uppercase tracking-[0.5em]">
            © 2026 Baliman Tamang
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
