<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Baliman Tamang | Visual Archive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,700&family=Inter:wght@200;400;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
  <style>
    body { background-color: #030303; color: #fafafa; font-family: 'Inter', sans-serif; overflow-x: hidden; margin: 0; }
    h1, h2, h3 { font-family: 'Playfair Display', serif; }
    .gallery { column-count: 1; column-gap: 2rem; }
    @media (min-width: 768px) { .gallery { column-count: 2; } }
    @media (min-width: 1024px) { .gallery { column-count: 3; } }
    .img-card { position: relative; overflow: hidden; background: #0a0a0a; border-radius: 4px; border: 1px solid rgba(255,255,255,0.03); }
    .img-card img { transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1); width: 100%; height: auto; display: block; filter: grayscale(100%); opacity: 0.7; }
    .img-card:hover img { transform: scale(1.08); filter: grayscale(0%); opacity: 1; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;
    const { motion, AnimatePresence } = FramerMotion;

    function App() {
      const [selected, setSelected] = useState(null);

      // Using the exact paths from your images folder
      const photos = [
        { id: 1, src: "assets/images/hero.jpg", title: "Himalayan Silence", loc: "Nepal" },
        { id: 2, src: "assets/images/culture.jpg", title: "Indigenous Heritage", loc: "Sauraha" },
        { id: 3, src: "assets/images/ilam.jpg", title: "Morning in Ilam", loc: "Eastern Nepal" },
        { id: 4, src: "assets/images/lamjung.jpg", title: "Highland Resilience", loc: "Lamjung" },
        { id: 5, src: "assets/images/research.jpg", title: "Social Fieldwork", loc: "Documentation" },
        { id: 6, src: "assets/images/sauraha.jpg", title: "Tharu Rhythms", loc: "Chitwan" }
      ];

      return (
        <div className="min-h-screen">
          <nav className="fixed top-0 w-full flex justify-between items-center px-8 py-8 z-50 mix-blend-difference">
            <h1 className="text-[10px] font-bold tracking-[0.5em] uppercase text-white">Baliman Tamang</h1>
            <a href="https://youtube.com/@nature_loverbnl" target="_blank" className="text-[9px] uppercase tracking-widest opacity-50">Films</a>
          </nav>
          <header className="h-[80vh] flex flex-col items-center justify-center text-center px-6">
            <h1 className="text-8xl md:text-[11rem] font-serif italic tracking-tighter text-white">Archive</h1>
            <p className="text-[10px] uppercase tracking-[0.7em] opacity-30 mt-12">Visual Research & Storytelling</p>
          </header>
          <main className="max-w-[1500px] mx-auto px-8 pb-40">
            <div className="gallery">
              {photos.map((photo, i) => (
                <div key={photo.id} onClick={() => setSelected(photo)} className="mb-14 cursor-pointer group">
                  <div className="img-card">
                    <img src={photo.src} alt={photo.title} onError={(e) => {
                      // Automatic fix if main path fails
                      if (!e.target.src.includes('Portfolio')) {
                        e.target.src = '/Portfolio/' + photo.src;
                      }
                    }} />
                  </div>
                  <div className="mt-6 border-t border-white/5 pt-4">
                    <h3 className="text-2xl font-serif italic text-white/90">{photo.title}</h3>
                    <p className="text-[9px] uppercase tracking-widest opacity-30 mt-2">{photo.loc}</p>
                  </div>
                </div>
              ))}
            </div>
          </main>
          <AnimatePresence>
            {selected && (
              <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} onClick={() => setSelected(null)} className="fixed inset-0 z-[100] bg-black/fb backdrop-blur-3xl flex flex-col items-center justify-center p-4">
                <img src={selected.src} className="max-w-full max-h-[82vh] object-contain shadow-2xl" />
                <p className="font-serif italic text-4xl text-white mt-12">{selected.title}</p>
              </motion.div>
            )}
          </AnimatePresence>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
