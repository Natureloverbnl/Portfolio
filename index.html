<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Baliman Tamang | Visual Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,700&family=Inter:wght@200;400;600&display=swap" rel="stylesheet" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html,body { height: 100%; }
        body { background: #030303; color: #fafafa; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        h1,h2,h3 { font-family: 'Playfair Display', serif; }
        nav { position: fixed; top: 0; left: 0; right: 0; display:flex; justify-content:space-between; align-items:center; padding:20px 32px; z-index:50; mix-blend-mode: difference; }
        nav h1 { font-size: 10px; letter-spacing: 0.5em; text-transform: uppercase; }
        nav a { font-size: 9px; text-transform: uppercase; opacity:0.6; text-decoration:none; color:inherit; }
        header { height: 80vh; display:flex; align-items:center; justify-content:center; flex-direction:column; text-align:center; padding:0 24px; }
        header h1 { font-size: clamp(48px, 15vw, 160px); font-style: italic; line-height: 0.9; }
        header p { margin-top: 24px; letter-spacing: .07em; font-size: 12px; opacity: .35; }
        main { max-width: 1500px; margin: 0 auto; padding: 24px; padding-bottom: 160px; }
        .gallery { column-count: 1; column-gap: 24px; }
        @media (min-width:768px) { .gallery { column-count: 2; } }
        @media (min-width:1024px) { .gallery { column-count: 3; } }
        .photo-item { break-inside: avoid; margin-bottom: 28px; outline: none; }
        .img-card { border-radius:6px; overflow:hidden; background:#0a0a0a; border:1px solid rgba(255,255,255,0.03); cursor: pointer; }
        .img-card img { display:block; width:100%; height:auto; filter:grayscale(100%); opacity:.75; transition: transform 1.1s cubic-bezier(.16,1,.3,1), filter .5s, opacity .5s; }
        .img-card:hover img { transform:scale(1.06); filter:grayscale(0%); opacity:1; }
        .photo-info { margin-top:10px; padding-top:12px; border-top:1px solid rgba(255,255,255,0.04); }
        .photo-title { font-style: italic; font-size:20px; color:rgba(255,255,255,0.92); }
        .photo-loc { margin-top:6px; font-size:11px; letter-spacing:.08em; color:rgba(255,255,255,0.3); text-transform:uppercase; }
        .modal { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.96); backdrop-filter: blur(8px); visibility:hidden; opacity:0; transition: opacity .25s ease; z-index:1000; padding:20px; }
        .modal.show { visibility:visible; opacity:1; }
        .modal-content { max-width: 96vw; max-height: 86vh; text-align:center; }
        .modal-content img { max-width:100%; max-height:82vh; object-fit:contain; display:block; margin:0 auto; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .modal-caption { margin-top:18px; font-family:'Playfair Display', serif; font-style:italic; font-size:28px; }
    </style>
</head>
<body>
    <nav>
        <h1>Baliman Tamang</h1>
        <a href="https://youtube.com/@nature_loverbnl" target="_blank" rel="noopener noreferrer">Films</a>
    </nav>
    <header>
        <h1>Archive</h1>
        <p>Visual Research &amp; Storytelling</p>
    </header>
    <main>
        <div id="gallery" class="gallery" aria-live="polite"></div>
    </main>
    <div id="modal" class="modal" role="dialog" aria-hidden="true">
        <div class="modal-content" id="modalContent">
            <img id="modalImage" src="" alt="" />
            <div id="modalCaption" class="modal-caption"></div>
        </div>
    </div>
    <script>
        (function () {
            const photos = [
                { id: 1, src: 'assets/images/hero.jpg', title: 'Himalayan Silence', loc: 'Nepal' },
                { id: 2, src: 'assets/images/culture.jpg', title: 'Indigenous Heritage', loc: 'Sauraha' },
                { id: 3, src: 'assets/images/ilam.jpg', title: 'Morning in Ilam', loc: 'Eastern Nepal' },
                { id: 4, src: 'assets/images/lamjung.jpg', title: 'Highland Resilience', loc: 'Lamjung' },
                { id: 5, src: 'assets/images/research.jpg', title: 'Social Fieldwork', loc: 'Documentation' },
                { id: 6, src: 'assets/images/sauraha.jpg', title: 'Tharu Rhythms', loc: 'Chitwan' }
            ];

            const gallery = document.getElementById('gallery');
            const modal = document.getElementById('modal');
            const modalImage = document.getElementById('modalImage');
            const modalCaption = document.getElementById('modalCaption');

            function createCard(photo) {
                const item = document.createElement('article');
                item.className = 'photo-item';
                item.setAttribute('tabindex', '0');

                const card = document.createElement('div');
                card.className = 'img-card';

                const img = document.createElement('img');
                img.src = photo.src;
                img.alt = photo.title;
                img.loading = 'lazy';

                // Simple error handling
                img.onerror = () => {
                    console.error("Missing image:", photo.src);
                };

                card.appendChild(img);
                item.appendChild(card);

                const info = document.createElement('div');
                info.className = 'photo-info';
                const title = document.createElement('div');
                title.className = 'photo-title';
                title.textContent = photo.title;
                const loc = document.createElement('div');
                loc.className = 'photo-loc';
                loc.textContent = photo.loc;

                info.appendChild(title);
                info.appendChild(loc);
                item.appendChild(info);

                function openModal() {
                    modalImage.src = photo.src;
                    modalImage.alt = photo.title;
                    modalCaption.textContent = photo.title;
                    modal.classList.add('show');
                    modal.setAttribute('aria-hidden', 'false');
                }

                card.addEventListener('click', openModal);
                item.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        openModal();
                    }
                });

                return item;
            }

            photos.forEach(p => gallery.appendChild(createCard(p)));

            modal.addEventListener('click', (e) => {
                modal.classList.remove('show');
                modal.setAttribute('aria-hidden', 'true');
                setTimeout(() => { modalImage.src = ''; }, 300);
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modal.classList.contains('show')) {
                    modal.classList.remove('show');
                    modal.setAttribute('aria-hidden', 'true');
                    setTimeout(() => { modalImage.src = ''; }, 300);
                }
            });
        })();
    </script>
</body>
</html>
