<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATURE_LOVERBNL | Visual Archive</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <style>
        body { background-color: #050505; color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .masonry { column-count: 1; column-gap: 1.5rem; }
        @media (min-width: 768px) { .masonry { column-count: 2; } }
        @media (min-width: 1024px) { .masonry { column-count: 3; } }
        .img-container { background: #111; position: relative; overflow: hidden; border-radius: 2px; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #222; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { motion, AnimatePresence } = FramerMotion;
        const { useState } = React;

        const App = () => {
            const [selectedImg, setSelectedImg] = useState(null);

            // UPDATED TO MATCH YOUR EXACT LIST
            const photos = [
                { id: 1, title: "Cultural Resilience", cat: "Ethnography", src: "images/Culture.jpg" },
                { id: 2, title: "Ilam Tea Research", cat: "Field 2025", src: "images/ilam.jpg" },
                { id: 3, title: "The Himalayan Peak", cat: "Landscape", src: "images/hero.jpg" },
                { id: 4, title: "Lamjung Series", cat: "Visual Study", src: "images/lamjung.jpg" },
                { id: 5, title: "Social Research", cat: "Documentation", src: "images/research.jpg" },
                { id: 6, title: "Sauraha Life", cat: "Social Work", src: "images/sauraha.jpg" }
            ];

            return (
                <div className="min-h-screen">
                    {/* Minimal Navigation */}
                    <nav className="fixed top-0 w-full z-50 p-8 flex justify-between mix-blend-difference">
                        <span className="text-xs font-bold tracking-[0.4em] uppercase">nature_loverbnl</span>
                        <div className="flex gap-6 text-[10px] uppercase tracking-widest opacity-40 font-bold">
                            <a href="https://youtube.com/@nature_loverbnl" target="_blank" className="hover:opacity-100 transition">YouTube</a>
                        </div>
                    </nav>

                    {/* Dramatic Hero Section */}
                    <header className="h-[70vh] flex flex-col items-center justify-center text-center px-6">
                        <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 1.2 }}>
                            <h1 className="text-6xl md:text-9xl font-serif italic tracking-tighter mb-4">The Archive</h1>
                            <div className="h-[1px] w-20 bg-white mx-auto opacity-20 mb-4"></div>
                            <p className="text-[9px] uppercase tracking-[0.6em] opacity-30">Photography & Social Research</p>
                        </motion.div>
                    </header>

                    {/* Animated Masonry Grid */}
                    <main className="max-w-[1400px] mx-auto px-6 pb-40">
                        <div className="masonry space-y-6">
                            {photos.map((photo, i) => (
                                <motion.div 
                                    key={photo.id}
                                    initial={{ opacity: 0, y: 40 }}
                                    whileInView={{ opacity: 1, y: 0 }}
                                    viewport={{ once: true }}
                                    transition={{ delay: i * 0.1, duration: 0.8 }}
                                    onClick={() => setSelectedImg(photo)}
                                    className="img-container group cursor-crosshair"
                                >
                                    <motion.img 
                                        whileHover={{ scale: 1.05 }}
                                        transition={{ duration: 0.9 }}
                                        src={photo.src} 
                                        className="w-full h-auto opacity-60 group-hover:opacity-100 transition-all duration-1000"
                                        alt={photo.title}
                                        onError={(e) => {
                                            // Handle case sensitivity (Try .jpg if .JPG fails or vice versa)
                                            if (e.target.src.includes('.jpg')) {
                                                e.target.src = e.target.src.replace('.jpg', '.JPG');
                                            } else if (e.target.src.includes('.JPG')) {
                                                e.target.src = e.target.src.replace('.JPG', '.jpg');
                                            }
                                        }}
                                    />
                                    <div className="absolute inset-0 p-8 flex flex-col justify-end bg-gradient-to-t from-black/90 via-transparent opacity-0 group-hover:opacity-100 transition-all">
                                        <h3 className="text-xl font-serif italic text-white">{photo.title}</h3>
                                        <p className="text-[9px] uppercase tracking-widest opacity-40 mt-1">{photo.cat}</p>
                                    </div>
                                </motion.div>
                            ))}
                        </div>
                    </main>

                    {/* Animated Lightbox */}
                    <AnimatePresence>
                        {selectedImg && (
                            <motion.div 
                                initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
                                onClick={() => setSelectedImg(null)}
                                className="fixed inset-0 z-[60] bg-black/fb backdrop-blur-2xl flex items-center justify-center p-4 cursor-zoom-out"
                            >
                                <motion.img 
                                    initial={{ scale: 0.8, opacity: 0 }}
                                    animate={{ scale: 1, opacity: 1 }}
                                    transition={{ type: "spring", damping: 25 }}
                                    src={selectedImg.src} 
                                    className="max-w-full max-h-[85vh] object-contain shadow-2xl"
                                />
                                <div className="absolute bottom-10 text-center">
                                    <p className="font-serif italic text-2xl mb-1">{selectedImg.title}</p>
                                    <p className="text-[9px] uppercase tracking-[0.4em] opacity-30">Click anywhere to exit</p>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    <footer className="py-20 text-center border-t border-white/5 opacity-20 text-[8px] uppercase tracking-[0.5em]">
                        © 2026 NATURE_LOVERBNL — BALIMAN TAMANG
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
