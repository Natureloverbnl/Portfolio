<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATURE_LOVERBNL | Creative Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,700&family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <style>
        body { background-color: #030303; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .masonry { column-count: 1; column-gap: 2rem; }
        @media (min-width: 768px) { .masonry { column-count: 2; } }
        @media (min-width: 1200px) { .masonry { column-count: 3; } }
        .lenis-smooth { scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 0px; } /* Clean, no-scroll look */
    </style>
</head>
<body class="lenis-smooth">
    <div id="root"></div>

    <script type="text/babel">
        const { motion, AnimatePresence, useScroll, useTransform, useSpring } = FramerMotion;
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [selectedImg, setSelectedImg] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                setTimeout(() => setLoading(false), 2000); // Simulate elite loader
            }, []);

            const photos = [
                { id: 1, title: "Ilam Tea Culture", cat: "Ethnography", src: "images/ilam.jpg" },
                { id: 2, title: "Himalayan Spirits", cat: "Landscape", src: "images/himalaya.jpg" },
                { id: 3, title: "Sauraha Documentation", cat: "Social Work", src: "images/sauraha.jpg" },
                { id: 4, title: "Indigenous Life", cat: "Visual Study", src: "images/culture.jpg" },
                { id: 5, title: "The High Peaks", cat: "Photography", src: "images/lamjung.jpg" },
                { id: 6, title: "Research Archive", cat: "Social Lens", src: "images/research.jpg" }
            ];

            if (loading) return (
                <div className="h-screen w-screen bg-[#030303] flex items-center justify-center">
                    <motion.div 
                        initial={{ opacity: 0 }} animate={{ opacity: 1 }}
                        className="text-[10px] tracking-[1em] uppercase opacity-30 italic"
                    >
                        Loading Archive...
                    </motion.div>
                </div>
            );

            return (
                <div className="relative">
                    {/* Progress Bar */}
                    <motion.div 
                        className="fixed top-0 left-0 right-0 h-1 bg-white z-[100] origin-left"
                        style={{ scaleX: useSpring(useScroll().scrollYProgress) }}
                    />

                    <nav className="fixed top-0 w-full z-50 p-10 flex justify-between mix-blend-difference">
                        <motion.span initial={{x:-20, opacity:0}} animate={{x:0, opacity:1}} className="text-xs font-bold tracking-[0.4em] uppercase">BNL</motion.span>
                        <motion.div initial={{x:20, opacity:0}} animate={{x:0, opacity:1}} className="flex gap-8 text-[9px] uppercase tracking-widest font-bold">
                            <a href="#work" className="hover:opacity-50 transition">Gallery</a>
                            <a href="https://youtube.com/@nature_loverbnl" target="_blank" className="hover:opacity-50 transition">Films</a>
                        </motion.div>
                    </nav>

                    <header className="h-screen flex flex-col items-center justify-center relative overflow-hidden">
                        <motion.div 
                            style={{ y: useTransform(useScroll().scrollY, [0, 500], [0, 200]) }}
                            className="absolute inset-0 opacity-20 z-0"
                        >
                            <img src="images/hero.jpg" className="w-full h-full object-cover scale-110" />
                        </motion.div>
                        
                        <div className="z-10 text-center">
                            <motion.p 
                                initial={{ opacity: 0, letterSpacing: "0.2em" }}
                                animate={{ opacity: 0.4, letterSpacing: "0.8em" }}
                                transition={{ duration: 1.5 }}
                                className="text-[10px] uppercase mb-8"
                            >
                                Social Researcher & Photographer
                            </motion.p>
                            <motion.h1 
                                initial={{ y: 100, opacity: 0 }}
                                animate={{ y: 0, opacity: 1 }}
                                transition={{ duration: 1, ease: "circOut" }}
                                className="text-7xl md:text-[12rem] font-serif italic leading-none"
                            >
                                Resilience
                            </motion.h1>
                        </div>
                    </header>

                    <main id="work" className="px-6 py-40 max-w-[1600px] mx-auto">
                        <div className="masonry">
                            {photos.map((photo, i) => (
                                <PhotoCard key={photo.id} photo={photo} index={i} setSelectedImg={setSelectedImg} />
                            ))}
                        </div>
                    </main>

                    <AnimatePresence>
                        {selectedImg && (
                            <motion.div 
                                initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
                                onClick={() => setSelectedImg(null)}
                                className="fixed inset-0 z-[60] bg-black/95 backdrop-blur-xl flex items-center justify-center p-6 cursor-zoom-out"
                            >
                                <motion.img 
                                    layoutId={`img-${selectedImg.id}`}
                                    src={selectedImg.src} 
                                    className="max-w-full max-h-full object-contain"
                                />
                                <div className="absolute top-10 right-10 text-xs tracking-widest uppercase opacity-40">Close</div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    <footer className="py-20 text-center opacity-20 text-[9px] tracking-[0.5em] uppercase">
                        Nature_LoverBNL — Archive 2026
                    </footer>
                </div>
            );
        };

        const PhotoCard = ({ photo, index, setSelectedImg }) => {
            const ref = useRef(null);
            const { scrollYProgress } = useScroll({ target: ref, offset: ["start end", "end start"] });
            const y = useTransform(scrollYProgress, [0, 1], [0, -50]); // Parallax inside grid
            
            return (
                <motion.div 
                    ref={ref}
                    layoutId={`img-${photo.id}`}
                    initial={{ opacity: 0, y: 50 }}
                    whileInView={{ opacity: 1, y: 0 }}
                    viewport={{ once: true, margin: "-100px" }}
                    onClick={() => setSelectedImg(photo)}
                    className="mb-12 relative group overflow-hidden bg-neutral-900 rounded-sm cursor-none md:cursor-zoom-in"
                >
                    <motion.div style={{ y }}>
                        <img 
                            src={photo.src} 
                            className="w-full grayscale group-hover:grayscale-0 transition-all duration-1000 opacity-60 group-hover:opacity-100"
                            alt={photo.title}
                            onError={(e) => { e.target.src = e.target.src.includes('.jpg') ? e.target.src.replace('.jpg', '.JPG') : e.target.src; }}
                        />
                    </motion.div>
                    <div className="absolute inset-0 p-8 flex flex-col justify-end bg-gradient-to-t from-black via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-all">
                        <p className="text-[10px] uppercase tracking-widest text-neutral-400">{photo.cat}</p>
                        <h3 className="text-2xl font-serif italic">{photo.title}</h3>
                    </div>
                </motion.div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
